name: Release binaries

# Builds the `epubsana` CLI for a broad set of Linux/macOS/Windows targets and
# attaches the archives to the matching GitHub Release. Pure Rust with no C
# dependencies, so every target builds on a runner of its own native
# architecture (x86_64 and ARM64 runners for both Linux and macOS; the one
# genuine cross-compile is ARM64 Windows, which the MSVC toolchain links from
# the x86_64 Windows runner). The only per-target setup is `musl-tools` for the
# static-musl Linux builds. Triggered automatically when a `v*` tag is pushed
# (the same tags used for GitHub Releases); `workflow_dispatch` allows a manual
# re-run against an existing tag (e.g. to backfill a release with new targets).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag/release to attach binaries to (e.g. v0.1.0)"
        required: true

# GITHUB_TOKEN defaults to read-only; softprops/action-gh-release needs write
# access to attach files to an existing release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 - glibc (portable across mainstream distros) and musl
          # (fully static, runs anywhere incl. Alpine / very old glibc).
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          # Linux ARM64 - native on GitHub's ARM64 runner.
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
          # macOS - Intel and Apple Silicon.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          # Windows - x86_64 (native) and ARM64 (cross-linked by MSVC).
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out
        uses: actions/checkout@v5

      # The static-musl targets link with musl-gcc; every other target uses the
      # runner's default toolchain as-is.
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --locked --bin epubsana --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          stage="epubsana-${{ matrix.target }}"
          mkdir "$stage"
          cp "target/${{ matrix.target }}/release/epubsana" "$stage/"
          cp LICENSE LICENSE-COMMERCIAL.md README.md "$stage/"
          tar czf "$stage.tar.gz" "$stage"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "epubsana-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/epubsana.exe" $stage/
          Copy-Item LICENSE, LICENSE-COMMERCIAL.md, README.md $stage/
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: epubsana-${{ matrix.target }}
          path: |
            epubsana-${{ matrix.target }}.tar.gz
            epubsana-${{ matrix.target }}.zip
          if-no-files-found: ignore

      # Populate the GitHub Release body from this version's CHANGELOG.md
      # section, so the release notes are never filled in by hand — which is the
      # step that gets forgotten (epubveri's v0.5.0/0.5.1/0.5.2 shipped with
      # blank release pages while their CHANGELOG entries existed; see
      # veripublica/epubveri, "ci: auto-fill GitHub Release notes"). Every matrix
      # job writes the same file and sets the same body — idempotent. `bash` is
      # available on all runners, Windows included.
      - name: Extract release notes from CHANGELOG
        shell: bash
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          ver="${tag#v}"
          awk -v ver="$ver" '
            $0 ~ "^## \\[" ver "\\]" {inblk=1; next}
            inblk && /^## \[/ {exit}
            inblk { if (!started && $0 ~ /^[[:space:]]*$/) next; started=1; buf[n++]=$0 }
            END { last=n-1; while (last>=0 && buf[last] ~ /^[[:space:]]*$/) last--; for (i=0;i<=last;i++) print buf[i] }
          ' CHANGELOG.md > RELEASE_NOTES.md
          # A tag whose version has no CHANGELOG section would otherwise publish
          # an empty release body — the very failure this step exists to prevent.
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "error: no '## [$ver]' section in CHANGELOG.md — add it before tagging" >&2
            exit 1
          fi
          printf '\n\nFull notes: [CHANGELOG.md](https://github.com/veripublica/epubsana/blob/main/CHANGELOG.md). Also on [crates.io](https://crates.io/crates/epubsana/%s).\n' "$ver" >> RELEASE_NOTES.md
          echo "----- extracted release notes -----"
          cat RELEASE_NOTES.md

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            epubsana-${{ matrix.target }}.tar.gz
            epubsana-${{ matrix.target }}.zip
